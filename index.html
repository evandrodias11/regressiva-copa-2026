<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copa do Mundo 2026 - Contagem Regressiva</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --gold: #d4af37;
        --gold-light: #f5e6a3;
        --dark: #0a0a12;
        --dark2: #12121f;
        --red: #c8102e;
        --green: #00843d;
        --blue: #1c3f94;
        --white: #f8f8f2;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--dark);
        color: var(--white);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* Animated Background */
      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .bg-layer::before {
        content: "";
        position: absolute;
        inset: -50%;
        background:
          radial-gradient(
            ellipse 600px 600px at 20% 30%,
            rgba(0, 132, 61, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 500px 500px at 80% 70%,
            rgba(28, 63, 148, 0.1) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 400px 400px at 50% 50%,
            rgba(200, 16, 46, 0.06) 0%,
            transparent 70%
          );
        animation: bgShift 20s ease-in-out infinite alternate;
      }
      @keyframes bgShift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-5%, 3%) scale(1.1);
        }
        100% {
          transform: translate(5%, -3%) scale(1);
        }
      }

      /* Grain overlay */
      .grain {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 128px 128px;
      }

      /* Hex pattern */
      .hex-pattern {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l26 15v30L30 60 4 45V15z' fill='none' stroke='%23D4AF37' stroke-width='0.5'/%3E%3C/svg%3E");
        background-size: 60px 60px;
      }

      .container {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      /* Trophy icon */
      .trophy-wrap {
        margin-bottom: 1rem;
        animation: float 4s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .trophy {
        width: 80px;
        height: 80px;
        filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
      }

      /* Top label */
      .top-label {
        font-size: 0.8rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0.8;
        margin-bottom: 0.5rem;
        font-weight: 600;
        animation: fadeSlideIn 1s 0.2s both;
      }

      /* Title */
      .title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.9;
        text-align: center;
        letter-spacing: 0.04em;
        background: linear-gradient(180deg, var(--white) 30%, var(--gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 20px rgba(212, 175, 55, 0.15));
        animation: fadeSlideIn 1s 0.4s both;
      }
      .title span {
        display: block;
        font-size: 0.45em;
        letter-spacing: 0.15em;
        background: linear-gradient(90deg, var(--gold-light), var(--gold));
        -webkit-background-clip: text;
        background-clip: text;
      }

      /* Subtitle */
      .subtitle {
        font-size: clamp(0.85rem, 2.5vw, 1.1rem);
        color: rgba(248, 248, 242, 0.5);
        margin-top: 0.6rem;
        text-align: center;
        font-weight: 300;
        letter-spacing: 0.05em;
        animation: fadeSlideIn 1s 0.6s both;
      }

      /* Divider */
      .divider {
        width: 120px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 1.8rem auto;
        animation: fadeSlideIn 1s 0.7s both;
      }

      /* Match info */
      .match-info {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 2rem;
        animation: fadeSlideIn 1s 0.8s both;
      }
      .flag-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
      }
      .flag {
        width: 64px;
        height: 44px;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .flag img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .team-name {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 600;
        color: rgba(248, 248, 242, 0.7);
      }
      .vs {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        color: var(--gold);
        opacity: 0.6;
      }

      /* Countdown Grid */
      .countdown {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: clamp(0.8rem, 3vw, 1.5rem);
        margin-bottom: 2rem;
        animation: fadeSlideIn 1s 1s both;
      }
      .count-box {
        position: relative;
        width: clamp(72px, 18vw, 140px);
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.01) 100%
        );
        border: 1px solid rgba(212, 175, 55, 0.15);
        backdrop-filter: blur(10px);
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        overflow: hidden;
      }
      .count-box::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(212, 175, 55, 0.06) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.4s;
      }
      .count-box:hover {
        transform: translateY(-4px);
        border-color: rgba(212, 175, 55, 0.35);
        box-shadow: 0 12px 40px rgba(212, 175, 55, 0.1);
      }
      .count-box:hover::before {
        opacity: 1;
      }

      .count-num {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.2rem, 7vw, 4.5rem);
        line-height: 1;
        color: var(--white);
        transition: transform 0.3s;
        position: relative;
        z-index: 1;
      }
      .count-num.tick {
        animation: tick 0.4s ease;
      }
      @keyframes tick {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.15);
          color: var(--gold);
        }
        100% {
          transform: scale(1);
        }
      }
      .count-label {
        font-size: clamp(0.55rem, 1.5vw, 0.75rem);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--gold);
        opacity: 0.7;
        margin-top: 0.2rem;
        font-weight: 600;
        position: relative;
        z-index: 1;
      }

      /* Seconds ring */
      .seconds-ring {
        position: absolute;
        inset: 4px;
        border-radius: 14px;
        pointer-events: none;
      }
      .seconds-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .seconds-ring circle {
        fill: none;
        stroke: var(--gold);
        stroke-width: 1.5;
        stroke-linecap: round;
        opacity: 0.2;
      }

      /* Venue info */
      .venue {
        text-align: center;
        animation: fadeSlideIn 1s 1.2s both;
      }
      .venue-icon {
        font-size: 1.2rem;
        margin-bottom: 0.3rem;
        opacity: 0.6;
      }
      .venue-text {
        font-size: 0.8rem;
        color: rgba(248, 248, 242, 0.4);
        letter-spacing: 0.06em;
        line-height: 1.6;
      }
      .venue-text strong {
        color: rgba(248, 248, 242, 0.65);
        font-weight: 600;
      }

      /* Bottom stripe */
      .bottom-stripe {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        z-index: 10;
        background: linear-gradient(
          90deg,
          var(--green),
          var(--red),
          var(--blue),
          var(--gold),
          var(--green)
        );
        background-size: 300% 100%;
        animation: stripeMove 6s linear infinite;
      }
      @keyframes stripeMove {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 300% 0;
        }
      }

      /* Floating particles */
      .particle {
        position: fixed;
        width: 3px;
        height: 3px;
        background: var(--gold);
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes particleFloat {
        0% {
          opacity: 0;
          transform: translateY(100vh) scale(0);
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateY(-20vh) scale(1);
        }
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Ball animation at bottom */
      .ball-container {
        margin-top: 2rem;
        animation: fadeSlideIn 1s 1.4s both;
      }
      .ball {
        width: 28px;
        height: 28px;
        animation: bounce 2s ease-in-out infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* Progress bar */
      .progress-section {
        width: min(500px, 90vw);
        margin-top: 1.5rem;
        animation: fadeSlideIn 1s 1.3s both;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.65rem;
        color: rgba(248, 248, 242, 0.35);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      .progress-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--gold));
        border-radius: 2px;
        transition: width 1s ease;
      }

      /* Live badge when event starts */
      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.5rem;
        background: var(--red);
        border-radius: 100px;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .live-dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: blink 1s step-end infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(200, 16, 46, 0.4);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(200, 16, 46, 0);
        }
      }
      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      @media (max-width: 480px) {
        .match-info {
          gap: 1rem;
        }
        .flag {
          width: 48px;
          height: 33px;
        }
        .count-box {
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="grain"></div>
    <div class="hex-pattern"></div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <div class="container">
      <div class="trophy-wrap">
        <svg
          class="trophy"
          viewBox="0 0 100 100"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M35 20h30v5H35z" fill="#D4AF37" />
          <path
            d="M32 25h36l-6 35H38z"
            fill="url(#tg)"
            stroke="#B8941F"
            stroke-width="1"
          />
          <path d="M38 60h24v4H38z" fill="#D4AF37" />
          <path d="M42 64h16l2 8H40z" fill="#D4AF37" />
          <path
            d="M36 72h28v4a4 4 0 01-4 4H40a4 4 0 01-4-4v-4z"
            fill="#B8941F"
          />
          <path
            d="M28 28c-8 2-14 10-12 20s10 14 16 12"
            fill="none"
            stroke="#D4AF37"
            stroke-width="3"
            stroke-linecap="round"
          />
          <path
            d="M72 28c8 2 14 10 12 20s-10 14-16 12"
            fill="none"
            stroke="#D4AF37"
            stroke-width="3"
            stroke-linecap="round"
          />
          <circle
            cx="50"
            cy="42"
            r="8"
            fill="none"
            stroke="#F5E6A3"
            stroke-width="1.5"
          />
          <text
            x="50"
            y="46"
            text-anchor="middle"
            fill="#F5E6A3"
            font-family="Bebas Neue"
            font-size="11"
          >
            26
          </text>
          <defs>
            <linearGradient
              id="tg"
              x1="50"
              y1="25"
              x2="50"
              y2="60"
              gradientUnits="userSpaceOnUse"
            >
              <stop stop-color="#F5E6A3" />
              <stop offset="1" stop-color="#D4AF37" />
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="top-label">Contagem Regressiva</div>
      <div class="title">
        COPA DO MUNDO
        <span>FIFA 2026</span>
      </div>
      <div class="subtitle">Primeiro jogo do torneio</div>

      <div class="divider"></div>

      <!-- Match Info -->
      <div class="match-info">
        <div class="flag-container">
          <div class="flag">
            <img
              src="https://flagcdn.com/w160/mx.png"
              alt="México"
              loading="lazy"
            />
          </div>
          <span class="team-name">México</span>
        </div>
        <span class="vs">VS</span>
        <div class="flag-container">
          <div class="flag">
            <img
              src="https://flagcdn.com/w160/za.png"
              alt="África do Sul"
              loading="lazy"
            />
          </div>
          <span class="team-name">África do Sul</span>
        </div>
      </div>

      <!-- Countdown -->
      <div class="countdown" id="countdown">
        <div class="count-box">
          <span class="count-num" id="days">--</span>
          <span class="count-label">Dias</span>
        </div>
        <div class="count-box">
          <span class="count-num" id="hours">--</span>
          <span class="count-label">Horas</span>
        </div>
        <div class="count-box">
          <span class="count-num" id="minutes">--</span>
          <span class="count-label">Minutos</span>
        </div>
        <div class="count-box" style="position: relative">
          <span class="count-num" id="seconds">--</span>
          <span class="count-label">Segundos</span>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-label">
          <span>Sorteio (Dez 2025)</span>
          <span id="progress-pct">0%</span>
          <span>11 Jun 2026</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Venue -->
      <div class="venue">
        <div class="venue-icon">🏟️</div>
        <div class="venue-text">
          <strong>Estádio Azteca</strong> · Cidade do México<br />
          11 de junho de 2026 · 16h (horário de Brasília)
        </div>
      </div>

      <div class="ball-container">
        <svg
          class="ball"
          viewBox="0 0 40 40"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle
            cx="20"
            cy="20"
            r="18"
            fill="#F8F8F2"
            stroke="#222"
            stroke-width="1"
          />
          <path
            d="M20 2a18 18 0 010 36M2 20a18 18 0 0136 0"
            fill="none"
            stroke="#333"
            stroke-width="0.5"
          />
          <path
            d="M20 8l5 4-2 6h-6l-2-6z"
            fill="#333"
            stroke="#333"
            stroke-width="0.5"
          />
          <path
            d="M12 22l-4 3-4-1"
            fill="none"
            stroke="#333"
            stroke-width="0.5"
          />
          <path
            d="M28 22l4 3 4-1"
            fill="none"
            stroke="#333"
            stroke-width="0.5"
          />
          <path
            d="M17 28l-1 5 3 3"
            fill="none"
            stroke="#333"
            stroke-width="0.5"
          />
          <path
            d="M23 28l1 5-3 3"
            fill="none"
            stroke="#333"
            stroke-width="0.5"
          />
        </svg>
      </div>
    </div>

    <div class="bottom-stripe"></div>

    <script>
      // Target: June 11, 2026, 16:00 Brasilia time = 19:00 UTC
      const TARGET = new Date(Date.UTC(2026, 5, 11, 19, 0, 0));

      // Draw reference: Dec 5, 2025
      const DRAW_DATE = new Date(Date.UTC(2025, 11, 5, 0, 0, 0));
      const TOTAL_SPAN = TARGET - DRAW_DATE;

      let prevValues = { days: -1, hours: -1, minutes: -1, seconds: -1 };

      function updateCountdown() {
        const now = new Date();
        const diff = TARGET - now;

        if (diff <= 0) {
          document.getElementById("countdown").innerHTML = `
      <div style="grid-column:1/-1;text-align:center">
        <div class="live-badge"><span class="live-dot"></span> AO VIVO</div>
        <p style="margin-top:1rem;font-size:1.2rem;color:var(--gold)">A Copa do Mundo 2026 começou!</p>
      </div>`;
          return;
        }

        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        setVal("days", days);
        setVal("hours", hours);
        setVal("minutes", minutes);
        setVal("seconds", seconds);

        // Progress
        const elapsed = now - DRAW_DATE;
        const pct = Math.min(100, Math.max(0, (elapsed / TOTAL_SPAN) * 100));
        document.getElementById("progress-fill").style.width =
          pct.toFixed(2) + "%";
        document.getElementById("progress-pct").textContent =
          pct.toFixed(1) + "%";
      }

      function setVal(id, val) {
        const el = document.getElementById(id);
        const str = String(val).padStart(2, "0");
        if (prevValues[id] !== val) {
          el.textContent = str;
          el.classList.remove("tick");
          void el.offsetWidth;
          el.classList.add("tick");
          prevValues[id] = val;
        }
      }

      // Particles
      function createParticles() {
        const container = document.getElementById("particles");
        for (let i = 0; i < 15; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          p.style.left = Math.random() * 100 + "%";
          p.style.animationDuration = 8 + Math.random() * 12 + "s";
          p.style.animationDelay = Math.random() * 10 + "s";
          p.style.animation = `particleFloat ${8 + Math.random() * 12}s linear ${Math.random() * 10}s infinite`;
          p.style.width = 2 + Math.random() * 3 + "px";
          p.style.height = p.style.width;
          container.appendChild(p);
        }
      }

      createParticles();
      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
